name: Publish to npm

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm
        # Use the Node-bundled npm rather than `npx npm@latest`: a broken
        # npm@latest release shipped a `provenance` path that fails to resolve
        # its `sigstore` dependency, breaking the publish.
        run: npm publish --provenance --access public
